services:
  users-db:
    image: postgres:alpine3.22
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  users-service:
    build:
      context: .
      dockerfile: users-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_URL=postgres://user:password@users-db:5432/usersdb?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=ILIACHALLENGE_INTERNAL
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - users-db
      - redis
