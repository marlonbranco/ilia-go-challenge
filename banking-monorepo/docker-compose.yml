services:
  users-db:
    image: postgres:alpine3.22
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-users:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-wallet:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet-db:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    healthcheck:
      test: >
        echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'wallet-db:27017'}]}) }" |
        mongosh --port 27017 --quiet
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 40s

  wallet-service:
    build:
      context: .
      dockerfile: ms-wallet/Dockerfile
    ports:
      - "3001:3001"
      - "50051:50051"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://wallet-db:27017/?replicaSet=rs0
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - MONGO_COLLECTION_PREFIX=${MONGO_COLLECTION_PREFIX}
      - REDIS_URL=redis-wallet:6379
      - JWT_SECRET=${JWT_SECRET}
      - GRPC_PORT=:50051
      - GRPC_CERT_FILE=/certs/wallet-service.crt
      - GRPC_KEY_FILE=/certs/wallet-service.key
      - GRPC_CA_FILE=/certs/ca.crt
    volumes:
      - ./certs/wallet-service.crt:/certs/wallet-service.crt:ro
      - ./certs/wallet-service.key:/certs/wallet-service.key:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
    depends_on:
      wallet-db:
        condition: service_healthy
      redis-wallet:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  users-service:
    build:
      context: .
      dockerfile: ms-users/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - POSTGRES_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@users-db:5432/${POSTGRES_DB}?sslmode=disable
      - REDIS_URL=redis-users:6379
      - JWT_SECRET=${JWT_SECRET}
      - WALLET_GRPC_ADDR=wallet-service:50051
      - GRPC_CERT_FILE=/certs/users-service.crt
      - GRPC_KEY_FILE=/certs/users-service.key
      - GRPC_CA_FILE=/certs/ca.crt
    volumes:
      - ./certs/users-service.crt:/certs/users-service.crt:ro
      - ./certs/users-service.key:/certs/users-service.key:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
    depends_on:
      users-db:
        condition: service_healthy
      redis-users:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
