openapi: "3.0.3"
info:
  title: ms-users
  version: "1.0.0"
  description: User authentication and management service.

servers:
  - url: http://localhost:3002
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RequestError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        request_id:
          type: string
          example: "01J9Z8X5K3PQRSTVWXYZ123456"
        error:
          type: object
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "field is required"

    TokenPair:
      type: object
      properties:
        success:
          type: boolean
          example: true
        request_id:
          type: string
        error:
          nullable: true
          example: null
        data:
          type: object
          properties:
            access_token:
              type: string
              description: Short-lived JWT (15 min).
            refresh_token:
              type: string
              description: Opaque UUID stored server-side (7 days).
            balance:
              type: integer
              format: int64
              nullable: true
              description: Wallet balance in whole units. Only present on login when wallet service is reachable.

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email

    UserEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        request_id:
          type: string
        error:
          nullable: true
          example: null
        data:
          $ref: "#/components/schemas/User"

    UsersListEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        request_id:
          type: string
        error:
          nullable: true
          example: null
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service is up
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password]
              properties:
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  minLength: 6
                  example: s3cr3tpassword
      responses:
        "201":
          description: User registered — returns token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  example: s3cr3tpassword
      responses:
        "200":
          description: Login successful — returns token pair (balance included when wallet service is reachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token, refresh_token]
              properties:
                access_token:
                  type: string
                  description: Expired or valid access token
                refresh_token:
                  type: string
                  format: uuid
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"

  /auth/logout:
    post:
      summary: Logout — invalidates the refresh token
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Logged out
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"

  /users:
    get:
      summary: List all users
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"

  /users/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"

    patch:
      summary: Update user profile (own only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"

    delete:
      summary: Delete user (own only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
        "400":
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestError"
